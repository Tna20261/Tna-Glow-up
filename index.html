function Collapse({title,color=C.acc,children,defaultOpen=false}){
  const [open,setOpen]=useState(defaultOpen);
  return(
    <div style={{border:`1px solid ${C.bd}`,borderRadius:12,overflow:"hidden",marginBottom:10,background:C.s2}}>
      <button onClick={()=>setOpen(!open)} style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 16px",background:"none",border:"none",cursor:"pointer"}}>
        <span style={{color:C.text,fontWeight:700,fontSize:13}}>{title}</span>
        <span style={{color,fontSize:14,transform:open?"none":"rotate(-90deg)",transition:"transform .2s"}}>▾</span>
      </button>
      {open&&<div style={{padding:"0 16px 14px"}}>{children}</div>}
    </div>
  );
}

    <button onClick={onToggle} style={{width:"100%",display:"flex",alignItems:"center",gap:11,borderRadius:9,border:`1px solid ${checked?color+"50":C.bd}`,padding:"10px 13px",marginBottom:5,cursor:"pointer",textAlign:"left",background:checked?color+"15":C.s2,transition:"all .15s"}}>

        {checked&&<span style={{color:"#000",fontSize:12,fontWeight:900}}>✓</span>}
      </div>
      <span style={{fontSize:12,lineHeight:1.4,flex:1,color:checked?C.muted:C.text,textDecoration:checked?"line-through":"none"}}>{task.t}</span>
    </button>
  );
}

// ── PROGRESS HELPERS ──────────────────────────────────────────────────────────
function weekProg(wi,checks){
  let t=0,d=0;
  for(let di=0;di<7;di++){buildTasks(wi,di).forEach(tk=>{t++;if(checks[`${wi}-${di}-${tk.id}`])d++;});}
  return {t,d,pct:t>0?Math.round(d/t*100):0};
}
function dayProg(wi,di,checks){
  const tasks=buildTasks(wi,di);
  const d=tasks.filter(t=>checks[`${wi}-${di}-${t.id}`]).length;
  return {t:tasks.length,d,pct:tasks.length>0?Math.round(d/tasks.length*100):0};
}
function globalPct(checks){
  let t=0,d=0;
  for(let w=0;w<TOTAL_WEEKS;w++){const p=weekProg(w,checks);t+=p.t;d+=p.d;}
  return t>0?Math.round(d/t*100):0;
}
